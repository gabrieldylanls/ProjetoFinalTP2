{% extends "base.html" %}

{% block title %}Sugerir produto | Compra Certa{% endblock %}

{% block content %}
  <h1>Sugerir produto</h1>
  <section class="card">
    <form method="post" action="{{ url_for('html.new_product_suggestion_page') }}">
      <label for="name">Nome</label>
      <input id="name" name="name" required>
      <label for="brand">Marca</label>
      <input id="brand" name="brand" required>
      <label for="bar_code">Código de barras</label>
      <input id="bar_code" name="bar_code" required minlength="13" maxlength="13">
      <label for="price">Preço base</label>
      <input id="price" name="price" type="number" min="0" step="0.01" required>
      <label for="quantity">Quantidade inicial</label>
      <input id="quantity" name="quantity" type="number" min="0" value="0" required>
      <button type="submit">Enviar sugestão</button>
    </form>
  </section>
{% endblock %}
