<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gerência de Compras{% endblock %}</title>
    <style>
      body { font-family: sans-serif; margin: 0 auto; max-width: 960px; padding: 1rem; }
      nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ccc; padding: .5rem; text-align: left; }
      form { display: grid; gap: .75rem; max-width: 32rem; }
      input, button { font: inherit; padding: .5rem; }
      .empty { color: #555; }
    </style>
  </head>
  <body>
    <nav aria-label="Navegação principal">
      <a href="{{ url_for('html.home_page') }}">Início</a>
      <a href="{{ url_for('html.products_page') }}">Produtos</a>
      <a href="{{ url_for('html.cart_page') }}">Carrinho</a>
      <a href="{{ url_for('html.new_product_page') }}">Cadastrar produto</a>
      {% if session.get("user_id") %}
        <span>Perfil: {{ session.get("role") }}</span>
      {% else %}
        <a href="{{ url_for('html.login_page') }}">Entrar</a>
      {% endif %}
    </nav>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
